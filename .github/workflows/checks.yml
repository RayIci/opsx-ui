name: checks

# Reusable gate: types, lint, formatting, tests, build. Called by both the PR
# pipeline (pr.yml) and the release pipeline (release.yml) so the gate is
# defined exactly once. Runs with no secrets.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
