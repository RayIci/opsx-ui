name: Release

# Publishes to npm when a version tag (vX.Y.Z) is pushed. Re-runs the full
# checks gate first, verifies the tag matches package.json and that the tagged
# commit is on main, then publishes with provenance via npm trusted publishing
# (OIDC) — no token required.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  publish:
    needs: checks
    runs-on: ubuntu-latest
    # Must match the Environment configured on the npm trusted publisher.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # required for trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the ancestor check below

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      # Node 22 ships npm 10.x; trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      - name: Verify tagged commit is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "Tagged commit is on main."
          else
            echo "::error::Tagged commit $GITHUB_SHA is not part of main's history."
            exit 1
          fi

      - run: npm ci

      # prepublishOnly rebuilds dist/ before the package is assembled.
      - name: Publish to npm
        run: npm publish --provenance --access public
